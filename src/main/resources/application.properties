server.port=${SERVER_PORT:8080}
server.servlet.context-path=/museotekbox

spring.application.name=museotek-box-backend

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/museotekbox?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# UNICHE platform
spring.security.oauth2.resourceserver.jwt.issuer-uri=${IDP_ISSUER_URI:https://idp.uniche-eccch.eu/realms/uniche}
uniche.catalogue.base-url=${CATALOGUE_BASE_URL:https://catalogue.uniche-eccch.eu}
uniche.tool.slug=${TOOL_SLUG:museotek-box}
museotek.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info
